server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      routes:
        - id: user-service-auth
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/auth/**

        - id: user-service-users
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

        - id: project-service-projects
          uri: lb://PROJECT-SERVICE
          predicates:
            - Path=/api/projects/**

        - id: project-service-applications
          uri: lb://PROJECT-SERVICE
          predicates:
            - Path=/api/project-applications/**

        - id: task-service-tasks
          uri: lb://TASK-SERVICE
          predicates:
            - Path=/api/tasks/**

        - id: skill-service-skills
          uri: lb://SKILL-SERVICE
          predicates:
            - Path=/api/skills/**

        - id: notification-service-notifications
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info