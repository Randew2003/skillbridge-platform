server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service-auth
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/auth/**

        - id: user-service-users
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

        - id: project-service-projects
          uri: lb://PROJECT-SERVICE
          predicates:
            - Path=/api/projects/**

        - id: project-service-applications
          uri: lb://PROJECT-SERVICE
          predicates:
            - Path=/api/project-applications/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info